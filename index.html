<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 🔥 Cache control meta tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>🔔 today's days</title>
    
    <!-- CSS with version - change version when you update -->
    <link rel="stylesheet" href="style.css?v=1.0.1">
</head>
<body class="dark">
    <!-- top bar with menu + dark toggle -->
    <div class="top-bar">
        <div class="menu-btn" id="menuToggle">
            ☰ <span>pick date</span>
        </div>
        <div class="dark-toggle" id="darkToggle">🌙</div>
    </div>

    <!-- main card -->
    <div class="notification-container" id="mainCard">
        <div class="today-header">
            <div class="date-chip" id="currentDateDisplay">15 <small>MAR</small></div>
            <div class="live-badge"><span></span> TODAY</div>
            <div class="event-counter" id="eventCountBadge">3 events</div>
        </div>

        <div class="greeting-toast" id="todayGreeting">
            🔔 15 March special notifications
        </div>

        <div id="eventsContainer" class="events-list">
            <!-- filled by js -->
        </div>

        <div class="footer-note" id="footerDate">
            showing events for <strong>March 15</strong>
        </div>
        <div class="reminder-bell">
            🔔 daily notification · exact date match
        </div>
    </div>

    <!-- drawer overlay + menu -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="date-drawer" id="dateDrawer">
        <div class="drawer-title">
            📅 jump to date
            <span class="drawer-close" id="closeDrawer">✕</span>
        </div>
        <div class="month-grid" id="monthGrid"></div>
        <div class="day-picker">
            <h4 id="selectedMonthLabel">select a month</h4>
            <div class="day-scroll" id="dayChipsContainer"></div>
        </div>
        <button class="goto-btn" id="jumpToDateBtn">🔔 show events</button>
    </div>

    <!-- JavaScript with version -->
    <script src="script.js?v=1.0.1"></script>
</body>
</html>
