            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* design tokens */
        :root {
            --bg-gradient-start: #d9e2ef;
            --bg-gradient-end: #c2d0e6;
            --container-bg: rgba(255,255,255,0.75);
            --text-primary: #0f2b44;
            --text-soft: #1e3c5c;
            --card-bg: #ffffff;
            --badge-bg: #1e3c5c;
            --badge-text: white;
            --accent-gold: #f9c74f;
            --accent-red: #f94144;
            --border-light: rgba(255,255,255,0.7);
            --shadow-color: rgba(0,20,50,0.15);
            --event-meta-bg: #e3eefb;
            --menu-bg: rgba(255,255,255,0.9);
            --icon-filter: none;
        }

        body.dark {
            --bg-gradient-start: #121e2c;
            --bg-gradient-end: #1b2b3f;
            --container-bg: rgba(20, 35, 55, 0.85);
            --text-primary: #e7edf8;
            --text-soft: #bdd3f0;
            --card-bg: #1f2e42;
            --badge-bg: #2c4c73;
            --badge-text: #f0f4fc;
            --accent-gold: #d4a13e;
            --accent-red: #c53a3a;
            --border-light: rgba(255,255,255,0.15);
            --shadow-color: rgba(0,0,0,0.5);
            --event-meta-bg: #2a3f5a;
            --menu-bg: rgba(25, 40, 60, 0.98);
            --icon-filter: brightness(0.9);
        }

        body {
            background: linear-gradient(165deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            transition: background 0.2s, color 0.2s;
        }

        /* top bar with menu + dark toggle */
        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            gap: 10px;
        }

        .menu-btn {
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-size: 1.7rem;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 14px var(--shadow-color);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            line-height: 1;
        }

        .menu-btn span {
            font-size: 1rem;
            margin-left: 5px;
        }

        .dark-toggle {
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-size: 1.8rem;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 14px var(--shadow-color);
            transition: 0.2s;
            user-select: none;
        }

        .dark-toggle:hover {
            transform: scale(0.97);
            background: var(--badge-bg);
            color: white;
        }

        /* main notification card */
        .notification-container {
            max-width: 600px;
            width: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 30px 50px -20px var(--shadow-color), 0 0 0 1px var(--border-light) inset;
            padding: 1.5rem 1.5rem 2rem;
            border: 1px solid var(--border-light);
            transition: background 0.2s;
        }

        .today-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .date-chip {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 12px 20px -12px #0a1f35;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 2px solid var(--accent-gold);
        }

        .date-chip small {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .live-badge {
            background: var(--accent-red);
            color: white;
            border-radius: 60px;
            padding: 0.5rem 1.3rem;
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 6px 14px var(--accent-red);
            border: 1px solid #ffba7a;
        }

        .live-badge span {
            width: 12px;
            height: 12px;
            background: #ffd966;
            border-radius: 50%;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); background: #ffe5b4; }
            50% { opacity: 0.5; transform: scale(1.4); background: #ffffff; }
            100% { opacity: 1; transform: scale(1); background: #ffe5b4; }
        }

        .event-counter {
            background: var(--accent-gold);
            color: #1e2b4f;
            border-radius: 60px;
            padding: 0.4rem 1.5rem;
            font-weight: 700;
            font-size: 1.2rem;
            margin-left: auto;
            box-shadow: 0 4px 8px #0000001a;
            border: 1px solid white;
            white-space: nowrap;
        }

        .greeting-toast {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 0.9rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid var(--accent-gold);
            word-break: break-word;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 20px 0;
        }

        .event-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 1.3rem 1.5rem;
            box-shadow: 0 8px 18px var(--shadow-color);
            border-left: 12px solid var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.15s;
            border: 1px solid var(--border-light);
            border-left-width: 12px;
        }

        .event-icon {
            font-size: 2rem;
            background: var(--event-meta-bg);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5), 0 6px 12px var(--shadow-color);
            filter: var(--icon-filter);
        }

        .event-content {
            flex: 1;
        }

        .event-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .event-meta {
            display: flex;
            gap: 12px;
            color: var(--text-soft);
            font-weight: 600;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .event-meta span {
            background: var(--event-meta-bg);
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            background: var(--container-bg);
            border-radius: 60px;
            padding: 3rem 1.5rem;
            text-align: center;
            font-size: 1.4rem;
            color: var(--text-primary);
            border: 3px dashed var(--accent-gold);
            backdrop-filter: blur(4px);
        }

        .footer-note {
            margin-top: 25px;
            color: var(--text-soft);
            background: var(--container-bg);
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-light);
        }

        .reminder-bell {
            background: var(--accent-gold);
            color: #0a1f35;
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* sliding drawer menu (mobile first) */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .date-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--menu-bg);
            backdrop-filter: blur(24px);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 2rem 1.5rem 2rem;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
            z-index: 999;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.1, 1);
            border: 1px solid var(--border-light);
            max-height: 75vh;
            overflow-y: auto;
        }

        .date-drawer.open {
            transform: translateY(0);
        }

        .drawer-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-close {
            font-size: 2rem;
            background: none;
            border: none;
            color: var(--text-soft);
            cursor: pointer;
            padding: 0 10px;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .month-item {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 1rem 0.5rem;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 4px 8px var(--shadow-color);
            cursor: pointer;
            transition: 0.1s;
        }

        .month-item:active {
            transform: scale(0.96);
            background: var(--badge-bg);
            color: white;
        }

        .day-picker {
            margin-top: 25px;
        }

        .day-picker h4 {
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .day-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px 0;
        }

        .day-chip {
            background: var(--container-bg);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            border: 1px solid var(--border-light);
            cursor: pointer;
        }

        .day-chip.selected {
            background: var(--accent-gold);
            color: #0a1f35;
            border-color: white;
        }

        .goto-btn {
            background: var(--badge-bg);
            color: white;
            border: none;
            width: 100%;
            padding: 1.2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 25px;
            cursor: pointer;
            border: 2px solid var(--accent-gold);
        }

        /* responsive */
        @media (max-width: 480px) {
            .date-chip { font-size: 1.5rem; padding: 0.5rem 1rem; }
            .live-badge { font-size: 1rem; padding: 0.4rem 1rem; }
            .event-counter { font-size: 1rem; padding: 0.4rem 1rem; }
            .event-title { font-size: 1.2rem; }
        }
    </style>
</head>

            { month: 10, day: 24, event: "United Nations Day / World Development Information Day" },
            { month: 10, day: 27, event: "World Day for Audiovisual Heritage" },
            { month: 10, day: 30, event: "World Thrift Day" },
            { month: 10, day: 31, event: "National Unity Day (India) (Birthday of Sardar Vallabhbhai Patel) / Halloween" },
            { month: 11, day: 1, event: "World Vegan Day / Rajyotsava Day (Karnataka Formation Day)" },
            { month: 11, day: 7, event: "National Cancer Awareness Day (India) / Infant Protection Day" },
            { month: 11, day: 8, event: "World Urbanism Day / International Day of Radiology" },
            { month: 11, day: 9, event: "Legal Services Day (India)" },
            { month: 11, day: 10, event: "World Science Day for Peace and Development" },
            { month: 11, day: 11, event: "National Education Day (India)" },
            { month: 11, day: 12, event: "World Pneumonia Day" },
            { month: 11, day: 13, event: "World Kindness Day" },
            { month: 11, day: 14, event: "Children's Day (India) (Birthday of Jawaharlal Nehru) / World Diabetes Day" },
            { month: 11, day: 16, event: "International Day for Tolerance" },
            { month: 11, day: 17, event: "National Epilepsy Day (India)" },
            { month: 11, day: 19, event: "World Toilet Day / International Men's Day" },
            { month: 11, day: 20, event: "Universal Children's Day / Africa Industrialization Day" },
            { month: 11, day: 21, event: "World Television Day / World Fisheries Day / World Hello Day" },
            { month: 11, day: 25, event: "International Day for the Elimination of Violence against Women" },
            { month: 11, day: 26, event: "National Law Day (Constitution Day) (India)" },
            { month: 11, day: 29, event: "International Day of Solidarity with the Palestinian People" },
            { month: 12, day: 1, event: "World AIDS Day" },
            { month: 12, day: 2, event: "World Computer Literacy Day / International Day for the Abolition of Slavery" },
            { month: 12, day: 3, event: "International Day of Persons with Disabilities" },
            { month: 12, day: 4, event: "Indian Navy Day" },
            { month: 12, day: 5, event: "International Volunteer Day / World Soil Day" },
            { month: 12, day: 7, event: "International Civil Aviation Day / Armed Forces Flag Day (India)" },
            { month: 12, day: 9, event: "International Anti-Corruption Day" },
            { month: 12, day: 10, event: "Human Rights Day" },
            { month: 12, day: 11, event: "International Mountain Day / UNICEF Day" },
            { month: 12, day: 14, event: "National Energy Conservation Day (India)" },
            { month: 12, day: 16, event: "Vijay Diwas (India) / Day of Reconciliation (South Africa)" },
            { month: 12, day: 18, event: "Minorities Rights Day (India) / International Migrants Day" },
            { month: 12, day: 19, event: "Goa Liberation Day (India)" },
            { month: 12, day: 20, event: "International Human Solidarity Day" },
            { month: 12, day: 22, event: "National Mathematics Day (India) (Birthday of Srinivasa Ramanujan)" },
            { month: 12, day: 23, event: "National Farmers Day (Kisan Diwas) (India)" },
            { month: 12, day: 24, event: "National Consumer Rights Day (India)" },
            { month: 12, day: 25, event: "Christmas Day / Good Governance Day (India)" }
        ];

        const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        
        // current date (system)
        const today = new Date();
        let currentMonth = today.getMonth() + 1;
        let currentDay = today.getDate();

        // UI elements
        const bodyEl = document.body;
        const darkToggle = document.getElementById('darkToggle');
        const menuToggle = document.getElementById('menuToggle');
        const drawer = document.getElementById('dateDrawer');
        const overlay = document.getElementById('drawerOverlay');
        const closeDrawer = document.getElementById('closeDrawer');
        const monthGrid = document.getElementById('monthGrid');
        const selectedMonthLabel = document.getElementById('selectedMonthLabel');
        const dayChipsContainer = document.getElementById('dayChipsContainer');
        const jumpBtn = document.getElementById('jumpToDateBtn');
        const currentDateDisplay = document.getElementById('currentDateDisplay');
        const eventCountBadge = document.getElementById('eventCountBadge');
        const todayGreeting = document.getElementById('todayGreeting');
        const footerDate = document.getElementById('footerDate');
        const eventsContainer = document.getElementById('eventsContainer');

        // state for drawer
        let selectedMonth = currentMonth; // default to current month
        let selectedDay = currentDay;

        // ---- render main card based on (month, day) ----
        function renderMainForDate(month, day) {
            const filtered = importantDays.filter(item => item.month === month && item.day === day);
            const monthName = monthNames[month-1];

            // update header / chips
            currentDateDisplay.innerHTML = `${day} <small>${monthName.substring(0,3).toUpperCase()}</small>`;
            todayGreeting.innerHTML = `🔔 ${day} ${monthName} special notifications`;
            footerDate.innerHTML = `showing events for <strong>${monthName} ${day}</strong>`;

            if (filtered.length === 0) {
                eventsContainer.innerHTML = `<div class="empty-state">✨ no important days on ${monthName} ${day} ✨</div>`;
                eventCountBadge.innerText = '0 events';
            } else {
                let cards = '';
                filtered.forEach(ev => {
                    cards += `
                        <div class="event-card">
                            <div class="event-icon">📌</div>
                            <div class="event-content">
                                <div class="event-title">${ev.event}</div>
                                <div class="event-meta">
                                    <span>📅 ${monthNames[ev.month-1]} ${ev.day}</span>
                                    <span>🔔 daily</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                eventsContainer.innerHTML = cards;
                eventCountBadge.innerText = `${filtered.length} event${filtered.length>1?'s':''}`;
            }
        }

        // ---- build month grid inside drawer ----
        function buildMonthGrid() {
            monthGrid.innerHTML = '';
            monthNames.forEach((name, idx) => {
                const m = idx+1;
                const btn = document.createElement('div');
                btn.className = 'month-item' + (m === selectedMonth ? ' selected' : '');
                btn.innerText = name.substring(0,3);
                btn.dataset.month = m;
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.month-item').forEach(el => el.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedMonth = m;
                    selectedMonthLabel.innerText = name + ' · choose day';
                    buildDayChips(m);
                });
                monthGrid.appendChild(btn);
            });
        }

        // ---- build day chips for given month ----
        function buildDayChips(month) {
            // get all days that exist in dataset for this month (unique)
            const daysInMonth = [...new Set(importantDays.filter(item => item.month === month).map(item => item.day))].sort((a,b) => a-b);
            dayChipsContainer.innerHTML = '';
            if (daysInMonth.length === 0) {
                dayChipsContainer.innerHTML = '<div style="color:var(--text-soft);">no days</div>';
                return;
            }
            daysInMonth.forEach(d => {
                const chip = document.createElement('span');
                chip.className = 'day-chip' + (d === selectedDay ? ' selected' : '');
                chip.innerText = d;
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('selected'));
                    chip.classList.add('selected');
                    selectedDay = d;
                });
                dayChipsContainer.appendChild(chip);
            });
        }

        // ---- open drawer & sync ----
        function openDrawer() {
            // sync selected month/day with current display values
            selectedMonth = currentMonth;
            selectedDay = currentDay;
            buildMonthGrid();
            selectedMonthLabel.innerText = monthNames[selectedMonth-1] + ' · choose day';
            buildDayChips(selectedMonth);
            // highlight correct month item after building
            setTimeout(() => {
                document.querySelectorAll('.month-item').forEach(el => {
                    if (Number(el.dataset.month) === selectedMonth) el.classList.add('selected');
                });
                // day chips will be updated by buildDayChips, but selected day highlight inside that func
                // we need to re-run buildDayChips to set selected day highlight
                buildDayChips(selectedMonth); // redo to apply selected class
            }, 10);
            drawer.classList.add('open');
            overlay.classList.add('active');
        }

        function closeDrawerFunc() {
            drawer.classList.remove('open');
            overlay.classList.remove('active');
        }

        // ---- jump button: update main view ----
        jumpBtn.addEventListener('click', () => {
            // update current global to selected
            currentMonth = selectedMonth;
            currentDay = selectedDay;
            renderMainForDate(currentMonth, currentDay);
            closeDrawerFunc();
        });

        // ---- dark mode toggle ----
        darkToggle.addEventListener('click', () => {
            bodyEl.classList.toggle('dark');
            darkToggle.innerText = bodyEl.classList.contains('dark') ? '☀️' : '🌙';
        });

        // ---- menu open/close ----
        menuToggle.addEventListener('click', openDrawer);
        closeDrawer.addEventListener('click', closeDrawerFunc);
        overlay.addEventListener('click', closeDrawerFunc);

        // ---- initial render with today ----
        renderMainForDate(currentMonth, currentDay);

        // ---- ensure drawer starts closed ----
        closeDrawerFunc();

        // ---- touch friendly ----
    })();
</script>
</body>
